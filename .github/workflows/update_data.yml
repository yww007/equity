name: 更新股票数据

on:
  schedule:
    # 双 cron 兜底：北京时间 08:00 / 12:00（因 Actions 队列延迟不定）
    - cron: '0 0 * * *'   # UTC 0:00 → 北京时间 8:00
    - cron: '0 4 * * *'   # UTC 4:00 → 北京时间 12:00
  workflow_dispatch:  # 支持手动触发 + 外部定时器（如 cron-job.org）通过 API 调用

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install akshare pandas

      - name: 抓取数据
        run: python3 fetch_stocks.py

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Auto update: $(date '+%Y-%m-%d') stock data"
          git push
