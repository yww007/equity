<div class="header">

            <p>中国A股核心财务数据 · 市盈率 · 市净率 · ROE · 毛利率</p>

        </div>
        <div class="header-right">

        </div>
    </div>
</div>

<div class="stats-bar" id="statsBar">

</div>

<div class="controls">

    <select class="filter-select" id="sortSelect" onchange="changeSort()">
        <option value="pe">按市盈率 (PE) 排序</option>
        <option value="pb">按市净率 (PB) 排序</option>
        <option value="peg">按 PEG 排序</option>
        <option value="roe">按 ROE 排序</option>
        <option value="gross_margin">按毛利率排序</option>
        <option value="net_margin">按净利率排序</option>
        <option value="debt_ratio">按资产负债率排序</option>
        <option value="cashflow">按经营活动现金流排序</option>
        <option value="net_profit_growth">按净利润增长率排序</option>
        <option value="revenue_growth">按营业收入增长率排序</option>
    </select>
    <select class="filter-select" id="industryFilter" onchange="filterTable()">
        <option value="">全部行业</option>
    </select>
</div>

<div class="container">
    <div class="table-wrapper">
        <div id="loading" class="loading">
            <div class="spinner"></div>

        </div>
        <div id="errorMsg" class="error-msg" style="display:none"></div>
        <table id="dataTable" style="display:none">
            <thead>

                    <th>市盈率<br><small>PE</small></th>

                    <th>行业</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

let stockData = [];
let currentSort = 'pe';
let ascending = false;

// ===== 格式化数值 =====
function fmtNum(val) {
    if (val === undefined || val === null) return '-';
    if (typeof val === 'string') return val;
    return val.toFixed(1);
}

function fmtCashflow(val) {
    if (val === undefined || val === null) return '-';
    return val.toFixed(1);
}

const exchangeMap = {
    'sh': '<span class="tag tag-sh">沪</span>',
    'sz': '<span class="tag tag-sz">深</span>',
    'bj': '<span class="tag tag-bj">北</span>'
};

// ===== 排序 =====
function sortData(data, key, asc) {
    return [...data].sort((a, b) => {
        let va = a[key] !== undefined ? a[key] : 0;
        let vb = b[key] !== undefined ? b[key] : 0;
        if (typeof va === 'string') va = parseFloat(va) || 0;
        if (typeof vb === 'string') vb = parseFloat(vb) || 0;
        return asc ? va - vb : vb - va;
    });
}

// ===== 渲染表格 =====
function renderTable(data) {
    const tbody = document.getElementById('tableBody');
    if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="13" style="text-align:center;padding:40px;color:var(--text-secondary);">暂无数据</td></tr>';
        return;
    }

    tbody.innerHTML = data.map((item, idx) => {
        const rank = idx + 1;
        let rankClass = '';
        if (rank === 1) rankClass = 'rank-1';
        else if (rank === 2) rankClass = 'rank-2';
        else if (rank === 3) rankClass = 'rank-3';

        const exchangeTag = exchangeMap[item.exchange] || '';

        return `<tr>
            <td><span class="rank ${rankClass}">${rank}</span></td>
            <td style="text-align:left;padding-left:16px;">
                ${item.name}
                <span class="stock-code">${item.code}</span>
                ${exchangeTag}
            </td>
            <td>${fmtNum(item.pe)}</td>
            <td>${fmtNum(item.pb)}</td>
            <td>${fmtNum(item.peg)}</td>
            <td>${fmtNum(item.roe)}%</td>
            <td>${fmtNum(item.gross_margin)}%</td>
            <td>${fmtNum(item.net_margin)}%</td>
            <td>${fmtNum(item.debt_ratio)}%</td>
            <td>${fmtCashflow(item.cashflow)}</td>
            <td>${fmtNum(item.net_profit_growth)}%</td>
            <td>${fmtNum(item.revenue_growth)}%</td>
            <td style="font-size:0.85em;color:var(--text-secondary);">${item.industry || '-'}</td>
        </tr>`;
    }).join('');
}

// ===== 过滤 =====
function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const industry = document.getElementById('industryFilter').value;

    let filtered = stockData.filter(item => {
        const matchSearch = !q || item.name.toLowerCase().includes(q) || item.code.toLowerCase().includes(q);
        const matchIndustry = !industry || item.industry === industry;
        return matchSearch && matchIndustry;
    });

    const sorted = sortData(filtered, currentSort, ascending);
    renderTable(sorted);
}

// ===== 改变排序 =====
function changeSort() {
    currentSort = document.getElementById('sortSelect').value;
    ascending = (currentSort === 'debt_ratio'); // 负债率低的排前面
    filterTable();
}

// ===== 深色模式 =====
function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
    const btn = document.querySelector('.dark-toggle');
    const isDark = document.body.classList.contains('dark-mode');
    btn.textContent = isDark ? '☀️ 亮色' : '🌙 深色';
    localStorage.setItem('equityDarkMode', isDark);
}

// ===== 加载数据 =====
async function loadData() {
    const updateEl = document.getElementById('updateTime');
    const loadingEl = document.getElementById('loading');
    const tableEl = document.getElementById('dataTable');
    const errorEl = document.getElementById('errorMsg');

    try {
        // 尝试加载外部 JSON
        const resp = await fetch('data/stocks.json?_=' + Date.now());
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const json = await resp.json();
        stockData = json.data || json;
        const meta = json.meta || {};

        // 更新时间
        if (meta.update_time) {
            updateEl.textContent = '数据更新于: ' + meta.update_time;
        } else {
            updateEl.textContent = '数据更新于: ' + new Date().toLocaleDateString('zh-CN');
        }

        // 统计
        document.getElementById('totalCount').textContent = stockData.length;
        const industries = [...new Set(stockData.map(d => d.industry).filter(Boolean))];
        document.getElementById('industryCount').textContent = industries.length;
        document.getElementById('dataDate').textContent = meta.data_date || meta.update_time || '最新';

        // 填充行业过滤
        const sel = document.getElementById('industryFilter');
        industries.sort().forEach(ind => {
            const opt = document.createElement('option');
            opt.value = ind;
            opt.textContent = ind;
            sel.appendChild(opt);
        });

    } catch (e) {
        console.warn('外部 JSON 加载失败，使用示例数据:', e.message);
        stockData = DEFAULT_DATA;

        updateEl.textContent = '示例数据（非实时）';

        document.getElementById('totalCount').textContent = stockData.length;
        const industries = [...new Set(stockData.map(d => d.industry).filter(Boolean))];
        document.getElementById('industryCount').textContent = industries.length;
        document.getElementById('dataDate').textContent = '示例数据';

        const sel = document.getElementById('industryFilter');
        industries.sort().forEach(ind => {
            const opt = document.createElement('option');
            opt.value = ind;
            opt.textContent = ind;
            sel.appendChild(opt);
        });
    }

    // 加载深色模式
    if (localStorage.getItem('equityDarkMode') === 'true') {
        document.body.classList.add('dark-mode');
        document.querySelector('.dark-toggle').textContent = '☀️ 亮色';
    }

    loadingEl.style.display = 'none';
    tableEl.style.display = '';
    currentSort = document.getElementById('sortSelect').value;
    filterTable();
}

// ===== 点击表头排序 =====
function setupHeaderSort() {
    const headers = document.querySelectorAll('thead th');
    const sortMap = {
        '排名': 'pe',
        '公司名称': 'name',
        '市盈率': 'pe',
        '市净率': 'pb',
        'PEG': 'peg',
        'ROE': 'roe',
        '毛利率': 'gross_margin',
        '净利率': 'net_margin',
        '资产负债率': 'debt_ratio',
        '经营活动现金流': 'cashflow',
        '净利润增长率': 'net_profit_growth',
        '营业收入增长率': 'revenue_growth',
    };

    headers.forEach((th, idx) => {
        th.style.cursor = 'pointer';
        th.addEventListener('click', () => {
            const text = th.textContent.trim().replace('↕', '').trim();
            const key = sortMap[text];
            if (!key) return;

            if (currentSort === key) {
                ascending = !ascending;
            } else {
                currentSort = key;
                ascending = (key === 'debt_ratio');
                document.getElementById('sortSelect').value = key;
            }

            headers.forEach(h => h.classList.remove('sorted'));
            th.classList.add('sorted');
            th.querySelector('.sort-icon').textContent = ascending ? '↑' : '↓';

            filterTable();
        });
    });
}

document.addEventListener('DOMContentLoaded', () => {
    setupHeaderSort();
    loadData();
});
